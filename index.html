<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlix 2026</title>
    <style>
        :root {
            --bg-color: #141414;
            --sidebar-color: #0b0b0b;
            --accent-color: #e50914;
            --accent-hover: #ff1a25;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --card-hover-bg: #1f1f1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MENU LATERAL --- */
        #sidebar {
            width: 240px;
            background-color: var(--sidebar-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #222;
            z-index: 10;
        }

        .logo {
            color: var(--accent-color);
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-group h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .menu-item {
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            background: transparent;
            border: none;
            color: var(--text-color);
            text-align: left;
            font-size: 15px;
        }

        .menu-item:hover, .menu-item.active {
            background-color: var(--accent-color);
            color: white;
            transform: translateX(5px);
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        /* --- BARRA TOPO --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(20,20,20,0.8), transparent);
            position: sticky;
            top: 0;
            z-index: 5;
            backdrop-filter: blur(10px);
            gap: 20px;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background-color: #222;
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #2b2b2b;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .sort-select {
            padding: 10px 15px;
            background-color: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .adblock-status {
            padding: 8px 15px;
            background-color: #1b4332;
            color: #52b788;
            border: 1px solid #2d6a4f;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- GRADE DE FILMES --- */
        .catalog-container {
            padding: 20px 40px 40px 40px;
        }

        .catalog-title {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background-color: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            border: 1px solid #252525;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--accent-color);
            background-color: var(--card-hover-bg);
        }

        .movie-thumb {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background-color: #333;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .movie-rating {
            background-color: #ffb703;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .movie-synopsis {
            font-size: 12px;
            color: #cccccc;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        /* --- PLAYER DE VÍDEO COMPLETO --- */
        #player-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .player-header {
            padding: 20px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 101;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-back {
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-back:hover {
            background-color: var(--accent-hover);
            transform: scale(1.05);
        }

        .player-movie-title {
            font-size: 20px;
            font-weight: bold;
        }

        .video-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Adblock alert/proteção simulação */
        .ad-shield-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #e50914;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- MENU LATERAL -->
    <nav id="sidebar">
        <div class="logo">CineFlix 2026</div>
        
        <div class="menu-group">
            <h3>Navegação</h3>
            <button class="menu-item active" onclick="filterCategory('inicio')">🏠 Início</button>
            <button class="menu-item" onclick="filterCategory('lancamentos')">✨ Lançamentos</button>
            <button class="menu-item" onclick="filterCategory('series')">📺 Séries</button>
        </div>

        <div class="menu-group">
            <h3>Gêneros</h3>
            <button class="menu-item" onclick="filterCategory('acao')">💥 Ação</button>
            <button class="menu-item" onclick="filterCategory('comedia')">😂 Comédia</button>
            <button class="menu-item" onclick="filterCategory('crime')">🕵️ Crime</button>
            <button class="menu-item" onclick="filterCategory('drama')">🎭 Drama</button>
            <button class="menu-item" onclick="filterCategory('romance')">❤️ Romance</button>
            <button class="menu-item" onclick="filterCategory('infantil')">🧸 Infantil</button>
        </div>
    </nav>

    <!-- ÁREA DE CONTEÚDO -->
    <main id="main-content">
        <header>
            <div class="search-container">
                <input type="text" id="search-bar" class="search-input" placeholder="Pesquisar filmes ou séries por título ou sinopse..." oninput="handleSearch()">
            </div>
            <div class="controls">
                <span class="adblock-status">🛡️ AD-BLOCK ATIVO</span>
                <select id="sort-filter" class="sort-select" onchange="handleSort()">
                    <option value="mais_vistos">Mais Vistos</option>
                    <option value="data">Data de Lançamento</option>
                    <option value="letra">Ordem Alfabética</option>
                </select>
            </div>
        </header>

        <div class="catalog-container">
            <h2 id="section-title" class="catalog-title">Principais Recomendações</h2>
            <div id="movie-grid" class="movie-grid">
                <!-- Inserido dinamicamente via JS -->
            </div>
        </div>
    </main>

    <!-- PLAYER DE VÍDEO (TELA CHEIA) -->
    <div id="player-screen">
        <div class="player-header">
            <button class="btn-back" onclick="closePlayer()">← VOLTAR AO INÍCIO</button>
            <span id="player-title" class="player-movie-title">Nome do Filme</span>
        </div>
        <div class="video-wrapper" id="video-container">
            <!-- Iframe do player injetado dinamicamente -->
        </div>
    </div>

    <script>
        // BANCO DE DADOS DE FILMES (Exemplo com URLs mockadas e dados completos)
        // Substitua os links do 'playerUrl' pelos seus links reais de players/embeds
        const moviesData = [
            {
                id: 1,
                title: "Michael jackson 2026",
                category: "drama",
                isLancamento: true,
                isSerie: false,
                year: 2026,
                views: 154000,
                rating: "8.7",
                image: "https://ingresso-a.akamaihd.net/prd/img/movie/maldicao-da-mumia/c4442b6a-12d5-45ba-9ed8-419db45634d8.webp",
                synopsis: "Uma família se depara com uma múmia ancestral, desencadeando uma aventura sobrenatural que mistura terror e suspense em uma nova versão do monstro clássico",
                playerUrl: "https://fembed.sx/e/1304313-dub"
            },
            {
                id: 2,
                title: "A Piada Infinita",
                category: "comedia",
                isLancamento: false,
                isSerie: false,
                year: 2024,
                views: 98000,
                rating: "7.9",
                image: "https://unsplash.com",
                synopsis: "Dois comediantes fracassados acidentalmente encontram um roteiro perdido que hipnotiza qualquer um que o leia com risadas incontroláveis.",
                playerUrl: "https://youtube.com"
            },
            {
                id: 3,
                title: "Mindhunter: Nova Era",
                category: "crime",
                isLancamento: true,
                isSerie: true,
                year: 2026,
                views: 245000,
                rating: "9.3",
                image: "https://unsplash.com",
                synopsis: "Detetives de elite utilizam novos algoritmos de inteligência artificial em 2026 para rastrear mentes criminosas antes que ajam.",
                playerUrl: "https://youtube.com"
            },
            {
                id: 4,
                title: "O Peso do Silêncio",
                category: "drama",
                isLancamento: false,
                isSerie: false,
                year: 2023,
                views: 45000,
                rating: "8.1",
                image: "https://unsplash.com",
                synopsis: "Uma pianista perde a audição no auge de sua carreira e precisa redescobrir sua conexão com o mundo através das vibrações visuais.",
                playerUrl: "https://youtube.com"
            },
            {
                id: 5,
                title: "Conexões Cruzadas",
                category: "romance",
                isLancamento: true,
                isSerie: false,
                year: 2025,
                views: 112000,
                rating: "8.4",
                image: "https://unsplash.com",
                synopsis: "Dois cientistas trabalhando em fusos horários opostos descobrem que conseguem compartilhar sonhos durante as fases da lua.",
                playerUrl: "https://youtube.com"
            },
            {
                id: 6,
                title: "As Aventuras de Bolt",
                category: "infantil",
                isLancamento: false,
                isSerie: true,
                year: 2025,
                views: 189000,
                rating: "9.0",
                image: "https://unsplash.com",
                synopsis: "Um pequeno robô doméstico ganha vida própria e embarca em uma jornada mágica no quintal para salvar os brinquedos esquecidos.",
                playerUrl: "https://youtube.com"
            }
        ];

        let currentCategory = 'inicio';
        let searchQuery = '';
        let currentSort = 'mais_vistos';

        // --- SISTEMA DE COR E SOM SINTETIZADO (Web Audio API) ---
        // Evita carregar arquivos MP3 externos e garante som instantâneo
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            // Ativa o contexto se estiver em repouso (exigência dos navegadores)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'hover') {
                // Som sutil e agudo de passagem rápida
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime); // Baixo volume para não irritar
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'click') {
                // Som firme de clique
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            }
        }

        // --- ANTI-ANÚNCIOS FORÇADO (SEGURANÇA 2026) ---
        // Intercepta tentativas de redirecionamento ou abertura de popups abusivos de players externos
        window.open = function() {
            triggerAdShieldAlert();
            return null; // Bloqueia abertura de novas abas
        };

        function triggerAdShieldAlert() {
            const shield = document.getElementById('ad-shield');
            shield.style.display = 'block';
            setTimeout(() => { shield.style.display = 'none'; }, 3000);
        }

        // Monitora iframes inseridos para evitar que scripts externos injetem redirects invisíveis
        window.addEventListener('beforeunload', function (e) {
            // Impede redirecionamentos automáticos forçados por ads sem interação direta
            if(document.activeElement.tagName === 'IFRAME') {
                e.preventDefault();
                triggerAdShieldAlert();
                return "Proteção ativa contra redirecionamento de anúncios.";
            }
        });

        // --- RENDERIZAÇÃO E FILTROS ---
        function initApp() {
            renderMovies();
            setupAudioEvents();
        }

        function setupAudioEvents() {
            // Aplica os gatilhos de som nos itens fixos do menu lateral
            document.querySelectorAll('.menu-item, .sort-select, .search-input').forEach(element => {
                element.addEventListener('mouseenter', () => playSound('hover'));
                element.addEventListener('click', () => playSound('click'));
            });
        }

        function filterCategory(category) {
            currentCategory = category;
            
            // Gerencia classes ativas no menu
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            const clickedBtn = event.currentTarget;
            if(clickedBtn) clickedBtn.classList.add('active');

            // Muda o título da seção de forma dinâmica
            const titles = {
                inicio: "Principais Recomendações",
                lancamentos: "Lançamentos de 2026",
                series: "Séries Exclusivas",
                acao: "Filmes de Ação",
                comedia: "Filmes de Comédia",
                crime: "Filmes de Crime e Suspense",
                drama: "Filmes de Drama",
                romance: "Filmes de Romance",
                infantil: "Filmes Infantis"
            };
            document.getElementById('section-title').innerText = titles[category] || "Filmes";

            renderMovies();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-bar').value.toLowerCase();
            renderMovies();
        }

        function handleSort() {
            currentSort = document.getElementById('sort-filter').value;
            renderMovies();
        }

        function renderMovies() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';

            // 1. Filtragem por categoria/gênero/busca
            let filtered = moviesData.filter(movie => {
                // Filtro Busca
                const matchesSearch = movie.title.toLowerCase().includes(searchQuery) || 
                                      movie.synopsis.toLowerCase().includes(searchQuery);
                
                if (!matchesSearch) return false;

                // Filtro Categorias Laterais
                if (currentCategory === 'inicio') return true;
                if (currentCategory === 'lancamentos') return movie.isLancamento;
                if (currentCategory === 'series') return movie.isSerie;
                return movie.category === currentCategory;
            });

            // 2. Ordenação (Mais Vistos, Data ou Ordem Alfabética)
            if (currentSort === 'mais_vistos') {
                filtered.sort((a, b) => b.views - a.views);
            } else if (currentSort === 'data') {
                filtered.sort((a, b) => b.year - a.year);
            } else if (currentSort === 'letra') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            }

            // 3. Renderização dos cards estruturados
            if(filtered.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; color: var(--text-muted); text-align: center; padding: 40px;">Nenhum filme ou série encontrado.</p>`;
                return;
            }

            filtered.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('onclick', `openPlayer('${movie.title}', '${movie.playerUrl}')`);
                
                // Eventos de som dinâmicos anexados aos novos elementos de capa
                card.addEventListener('mouseenter', () => playSound('hover'));
                card.addEventListener('click', () => playSound('click'));

                card.innerHTML = `
                    <img class="movie-thumb" src="${movie.image}" alt="${movie.title}">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">
                            <span>${movie.year}</span>
                            <span class="movie-rating">★ ${movie.rating}</span>
                        </div>
                        <div class="movie-synopsis">${movie.synopsis}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- SISTEMA INTERATIVO DO PLAYER ---
        function openPlayer(title, url) {
            document.getElementById('player-title').innerText = title;
            
            // Configura o Iframe protegendo com sandbox avançado para cortar anúncios em nível de navegador
            const container = document.getElementById('video-container');
            container.innerHTML = `
                <iframe 
                    src="${url}" 
                    allowfullscreen 
                    scrolling="no"
                    sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts">
                </iframe>
            `;
            
            document.getElementById('player-screen').style.display = 'flex';
        }

        function closePlayer() {
            // Para o vídeo limpando o iframe e fecha a tela do player voltando ao início
            document.getElementById('video-container').innerHTML = '';
            document.getElementById('player-screen').style.display = 'none';
            playSound('click');
        }

        // Inicia o app ao carregar a página
        window.onload = initApp;
    </script>
</body>
</html>
