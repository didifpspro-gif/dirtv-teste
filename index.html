<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlix Cinema 2026</title>
    <style>
        /* Variáveis de Cores e Imagem de Fundo */
        :root {
            --bg-site: #101010;
            --bg-sidebar: rgba(5, 5, 5, 0.85);
            --bg-card: rgba(24, 24, 24, 0.8);
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #e50914; 
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-item: rgba(40, 40, 40, 0.9);
            /* Imagem de Fundo de Cinema Otimizada */
            --bg-image: url('https://www.10wallpaper.com/wallpaper/1366x768/1808/Blue_rays_vector_4K_dark_background_1366x768.jpg');
        }

        /* Tema Alternativo Roxo Neon */
        .theme-cyber {
            --bg-site: #0b0914;
            --bg-sidebar: rgba(4, 3, 8, 0.85);
            --bg-card: rgba(20, 17, 38, 0.8);
            --text-main: #ffffff;
            --text-sub: #9f9cb0;
            --accent: #8a2be2; 
            --border-color: rgba(138, 43, 226, 0.2);
            --hover-item: rgba(33, 28, 56, 0.9);
            --bg-image: url('https://unsplash.com');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-site);
            /* Configuração da Imagem de Fundo do Site */
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Bloqueio de Anúncios Invasivos e Abas Externas */
        iframe {
            sandbox: allow-scripts allow-same-origin allow-forms; 
            pointer-events: auto;
        }

        /* Menu Lateral Esquerdo Semi-Transparente */
        .sidebar {
            width: 200px;
            background-color: var(--bg-sidebar);
            border-right: 5px solid var(--border-color);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            padding-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .menu-item {
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-sub);
            transition: all 0.2s ease;
        }

        .menu-item:hover, .menu-item.active {
            background-color: var(--hover-item);
            color: var(--text-main);
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        /* Área Principal */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra Superior */
        .top-bar {
            height: 70px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(16, 16, 16, 0.4);
            backdrop-filter: blur(15px);
            z-index: 5;
        }

        .search-input {
            width: 300px;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            width: 350px;
        }

        .controls-right {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Área de Rolagem do Conteúdo */
        .content-scroll {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Seção Isolada do Player de Vídeo */
        .player-section {
            display: none;
            flex-direction: column;
            gap: 12px;
            background: #000;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            border-radius: 6px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Filmes organizados um do lado do outro (Grid Responsivo) */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; 
        }

        /* Cards Verticais Semitransparentes com Efeito de Fundo */
        .movie-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column; 
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            backdrop-filter: blur(5px); /* Desfoca suavemente o fundo atrás do card */
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background-color: rgba(30, 30, 30, 0.95);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
        }

        .movie-image {
            width: 100%;
            height: 450px; 
            object-fit: cover;
            transition: transform 0.1s ease;
        }

        .movie-card:hover .movie-image {
            transform: scale(1.0);
        }

        .movie-details {
            padding:15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .movie-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta-data {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-sub);
        }

        .rating-badge {
            color: #ffb61e;
            font-weight: bold;
            background: rgba(255, 182, 30, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .movie-synopsis {
            font-size: 12px;
            color: var(--text-sub);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

    <div class="main-container">
        
        <!-- BARRA SUPERIOR (Pesquisa por Letra e Filtros) -->
        <div class="top-bar">
            <div class="search-area">
                <input type="text" id="movieSearch" class="search-input" placeholder="Pesquise por letra ou nome..." oninput="triggerSearch()">

                <button class="btn" onclick="applySorting('letra')">🔤 Por Letra (A-Z)</button>
                <button class="btn" onclick="switchTheme()" style="background: var(--accent); color: white; border: none;">🎨 Mudar Cor</button>
            </div>
        </div>

        <!-- Conteúdo Rolável -->
        <div class="content-scroll">
            
            <!-- SEÇÃO DO PLAYER (Botão Voltar ao Início acima do player) -->
            <div id="playerContainer" class="player-section">
                <button class="btn" onclick="returnToHome()" style="align-self: flex-start; margin-bottom: 5px;">⬅️ Voltar para o Início</button>
                <div class="video-wrapper">
                    <iframe id="mainPlayer" src="" allowfullscreen></iframe>
                </div>
            </div>

            <!-- FILMES UM DO LADO DO OUTRO -->
            <div id="moviesGridLocation" class="movies-grid">
                <!-- Filmes gerados dinamicamente via JS -->
            </div>

        </div>
    </div>

        let selectedCategory = 'all';

        const audioHoverCard = document.getElementById('audio-hover-card');
        const audioHoverSidebar = document.getElementById('audio-hover-sidebar');
        const audioClickGlobal = document.getElementById('audio-click-global');

        // Ativação dos Sons Customizados
        function bindSoundEffects() {
            document.querySelectorAll('.menu-item').forEach(item => {
                item.onmouseenter = () => { audioHoverSidebar.currentTime = 0; audioHoverSidebar.play().catch(()=>{}); };
                item.addEventListener('click', () => { audioClickGlobal.currentTime = 0; audioClickGlobal.play().catch(()=>{}); });
            });

            document.querySelectorAll('.movie-card').forEach(card => {
                card.onmouseenter = () => { audioHoverCard.currentTime = 0; audioHoverCard.play().catch(()=>{}); };
                card.addEventListener('click', () => { audioClickGlobal.currentTime = 0; audioClickGlobal.play().catch(()=>{}); });
            });

            document.querySelectorAll('.btn').forEach(btn => {
                btn.onmouseenter = () => { audioHoverSidebar.currentTime = 0; audioHoverSidebar.play().catch(()=>{}); };
                btn.addEventListener('click', () => { audioClickGlobal.currentTime = 0; audioClickGlobal.play().catch(()=>{}); });
            });
        }

        // Renderização dos cards na tela
        function drawMoviesList(movies) {
            const container = document.getElementById('moviesGridLocation');
            container.innerHTML = "";

            if(movies.length === 0) {
                container.innerHTML = `<p style='color: var(--text-sub); padding: 20px;'>Nenhum filme corresponde à pesquisa.</p>`;
                return;
            }

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.addEventListener('click', () => launchVideoPlayer(movie.videoUrl));

                card.innerHTML = `
                    <img class="movie-image" src="${movie.img}" alt="${movie.title}">
                    <div class="movie-details">
                        <h2 class="movie-title">${movie.title}</h2>
                        <div class="movie-meta-data">
                            <span>📅 ${new Date(movie.date).getFullYear()}</span>
                            <span class="rating-badge">⭐ ${movie.rating}</span>
                        </div>
                        <p class="movie-synopsis">${movie.synopsis}</p>
                    </div>
                `;
                container.appendChild(card);
            });

            bindSoundEffects();
        }

        // Modo de Busca Dinâmica por Letra ou Nome
        function triggerSearch() {
            const searchValue = document.getElementById('movieSearch').value.toLowerCase();
            const results = moviesDatabase.filter(movie => {
                const matchText = movie.title.toLowerCase().includes(searchValue);
                const matchCat = (selectedCategory === 'all' || movie.category === selectedCategory || movie.tags.includes(selectedCategory));
                return matchText && matchCat;
            });
            drawMoviesList(results);
        }

        // Filtro por Abas do Canto Esquerdo
        function filterCategory(category, element) {
            selectedCategory = category;
            document.getElementById('movieSearch').value = ''; 

            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if(category === 'all') {
                drawMoviesList(moviesDatabase);
            } else {
                const filtered = moviesDatabase.filter(movie => movie.category === category || movie.tags.includes(category));
                drawMoviesList(filtered);
            }
            returnToHome(); 
        }

        // Ordenadores por Data, Cliques/Vistos e Ordem Alfabética
        function applySorting(criteria) {
            let listToSort = [...moviesDatabase];
            
            if(selectedCategory !== 'all') {
                listToSort = listToSort.filter(m => m.category === selectedCategory || m.tags.includes(selectedCategory));
            }

            if(criteria === 'data') {
                listToSort.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if(criteria === 'vistos') {
                listToSort.sort((a, b) => b.views - a.views);
            } else if(criteria === 'letra') {
                listToSort.sort((a, b) => a.title.localeCompare(b.title));
            }

            drawMoviesList(listToSort);
        }

        // Gerenciamento Inteligente do Player URL Seguro
        function launchVideoPlayer(url) {
            const container = document.getElementById('playerContainer');
            const playerIframe = document.getElementById('mainPlayer');
            
            playerIframe.src = url;
            container.style.display = 'flex';
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function returnToHome() {
            const container = document.getElementById('playerContainer');
            const playerIframe = document.getElementById('mainPlayer');
            
            playerIframe.src = ""; 
            container.style.display = 'none';
        }

        // Alternar Cor e Fundo do Site (Troca de Temas)
        function switchTheme() {
            document.body.classList.toggle('theme-cyber');
        }

        window.onload = () => {
            drawMoviesList(moviesDatabase);
        };
    </script>
</body>
